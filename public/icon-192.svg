<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="96" cy="96" r="96" fill="url(#grad1)"/>

  <!-- Split symbol: overlapping circles -->
  <circle cx="60" cy="96" r="45" fill="white" opacity="0.95"/>
  <circle cx="132" cy="96" r="45" fill="white" opacity="0.95"/>

  <!-- Dollar sign in center -->
  <text x="96" y="110" font-size="80" font-weight="bold" fill="#16a34a" text-anchor="middle" font-family="Inter, sans-serif">$</text>
</svg>