<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient background -->
  <defs>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Circle background -->
  <circle cx="256" cy="256" r="256" fill="url(#grad2)"/>

  <!-- Split symbol: overlapping circles -->
  <circle cx="160" cy="256" r="120" fill="white" opacity="0.95"/>
  <circle cx="352" cy="256" r="120" fill="white" opacity="0.95"/>

  <!-- Dollar sign in center -->
  <text x="256" y="290" font-size="200" font-weight="bold" fill="#16a34a" text-anchor="middle" font-family="Inter, sans-serif">$</text>
</svg>