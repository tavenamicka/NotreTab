<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>NotreTab</title>

    <!-- PWA & Branding -->
    <meta name="description" content="Application de partage de dépenses en groupe. Gérez vos participations occasionnelles et budgets communs facilement." />
    <meta name="theme-color" content="#22c55e" />
    <meta name="color-scheme" content="light" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icon-192.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="NotreTab" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/serviceWorker.js')
            .then((registration) => {
              console.log('[App] Service Worker registered:', registration);
            })
            .catch((error) => {
              console.warn('[App] Service Worker registration failed:', error);
            });
        });
      } else {
        console.log('[App] Service Workers not supported');
      }
    </script>
  </body>
</html>
